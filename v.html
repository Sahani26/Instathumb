<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Instagram Video Generator</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

video{
max-width:90%;
margin-top:20px;
}

canvas{
display:block;
margin:20px auto;
max-width:400px;
width:90vw;
border:2px solid #333;
}

button{
padding:12px 24px;
margin:10px;
font-size:20px;
background:#003769;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<h2>Instagram Video Generator</h2>

<input type="file" id="upload" accept="video/*">

<br><br>

<video id="video" controls></video>

<canvas id="canvas" width="1080" height="1080"></canvas>

<button id="downloadBtn">Download Video</button>

<script>

const upload = document.getElementById("upload");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const downloadBtn = document.getElementById("downloadBtn");

let recorder;
let chunks = [];

const logo = new Image();
logo.src="https://www.powercoolfix.com/_next/image?url=%2F_next%2Fstatic%2Fmedia%2Fheader-logo.17093a1a.png&w=256&q=75";

upload.addEventListener("change",(e)=>{

const file = e.target.files[0];
const url = URL.createObjectURL(file);

video.src = url;
video.load();

});

function drawFrame(){

ctx.drawImage(video,0,0,1080,1080);

const textHeight=100;
const textY=1080-textHeight;

ctx.fillStyle="#ddd";
ctx.fillRect(0,textY,1080,textHeight);

ctx.fillStyle="#224771";
ctx.font="bold 36px Arial";
ctx.fillText("Mob: +91 9428213314",40,textY+60);

const logoWidth=220;
const logoHeight=90;

ctx.drawImage(logo,1080-logoWidth-40,1080-logoHeight-40,logoWidth,logoHeight);

requestAnimationFrame(drawFrame);

}

video.addEventListener("play",drawFrame);

downloadBtn.addEventListener("click",()=>{

const stream = canvas.captureStream(30);

recorder = new MediaRecorder(stream,{
mimeType:"video/webm"
});

chunks=[];

recorder.ondataavailable=e=>{
if(e.data.size>0) chunks.push(e.data);
};

recorder.onstop=()=>{

const blob=new Blob(chunks,{type:"video/webm"});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="instagram-video.webm";
a.click();

};

video.currentTime=0;
video.play();

recorder.start();

video.onended=()=>{
recorder.stop();
};

});

</script>

</body>
</html>
