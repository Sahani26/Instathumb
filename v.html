<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Instagram Video Generator</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f2f2f2;
text-align:center;
}

video{
max-width:90%;
margin-top:20px;
}

canvas{
display:block;
margin:20px auto;
width:90vw;
max-width:400px;
border:2px solid #333;
}

input{
font-size:20px;
background:#003769;
color:#fff;
padding:10px 14px;
border-radius:8px;
border:none;
}

button{
padding:12px 24px;
margin:10px;
cursor:pointer;
font-size:20px;
background:#003769;
color:#fff;
border:none;
border-radius:8px;
}

button:hover{
background:#004c8c;
}

</style>

</head>

<body>

<h2>Instagram Video Generator</h2>

<input type="file" id="upload" accept="video/*">

<br><br>

<video id="video" controls></video>

<canvas id="canvas" width="1080" height="1080"></canvas>

<button id="downloadBtn" style="display:none;">Download Video</button>

<script>

const upload = document.getElementById("upload");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const downloadBtn = document.getElementById("downloadBtn");

let videoFile;

const logo = new Image();
logo.crossOrigin="anonymous";
logo.src="https://www.powercoolfix.com/_next/image?url=%2F_next%2Fstatic%2Fmedia%2Fheader-logo.17093a1a.png&w=256&q=75";

upload.addEventListener("change", function(e){

videoFile = e.target.files[0];

if(!videoFile) return;

const url = URL.createObjectURL(videoFile);

video.src = url;
video.load();

video.addEventListener("loadedmetadata", function(){
video.currentTime = 1;
});

});

video.addEventListener("seeked", function(){

ctx.clearRect(0,0,1080,1080);

ctx.drawImage(video,0,0,1080,1080);

const textHeight = 100;
const textY = 1080 - textHeight;

ctx.fillStyle = "#ddd";
ctx.fillRect(0,textY,1080,textHeight);

ctx.fillStyle = "#224771";
ctx.font = "bold 36px Arial";
ctx.fillText("Mob: +91 9428213314",40,textY + 60);

const logoWidth = 220;
const logoHeight = 90;

ctx.drawImage(logo,1080 - logoWidth - 40,1080 - logoHeight - 40,logoWidth,logoHeight);

downloadBtn.style.display="inline-block";

});

downloadBtn.addEventListener("click", () => {

if (!videoFile) {
alert("Upload video first");
return;
}

const reader = new FileReader();

reader.onload = function(e){

const link = document.createElement("a");

link.href = e.target.result;

link.download = videoFile.name || "instagram-video.mp4";

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

};

reader.readAsDataURL(videoFile);

});

</script>

</body>

</html>
